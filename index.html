<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Train the Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0eeea;
    --muted: #888580;
    --key-bg: #1a0a2e;
    --key-border: #6022A6;
    --key-text: #b06de0;
    --correct-bg: #0f2d1a;
    --correct-border: #1a5c30;
    --correct-text: #5ddb8a;
    --wrong-bg: #2d0f0f;
    --wrong-border: #5c1a1a;
    --wrong-text: #e86868;
    --accent: #4f8ef7;
    --win: #5ddb8a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'DM Mono', monospace;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--text);
  }

  header p {
    margin-top: 0.5rem;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .timer-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 8px 20px;
    margin-bottom: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    color: var(--muted);
  }

  .timer-bar span#timer {
    color: var(--text);
    font-size: 17px;
    font-weight: 500;
    min-width: 56px;
    text-align: center;
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .puzzle { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 18px; }

  .row-wrap { display: flex; flex-direction: column; gap: 8px; }

  .clue {
    font-size: 13px;
    color: var(--muted);
    padding-left: 4px;
    letter-spacing: 0.01em;
  }

  .clue strong {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--key-text);
    margin-right: 6px;
  }

  .tile-row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  .tile {
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 19px;
    font-weight: 500;
    text-transform: uppercase;
    color: var(--text);
    background: var(--surface);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .tile.empty { color: transparent; background: #0d0d0f; border-color: rgba(255,255,255,0.05); }
  .tile.key { background: var(--key-bg); border-color: var(--key-border); color: var(--key-text); }
  .tile.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); }
  .tile.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong-text); }
  .tile.key.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); }
  .tile.key.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong-text); }

  .guess-input {
    display: block;
    width: 100%;
    max-width: 300px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    letter-spacing: 3px;
    text-align: center;
    text-transform: uppercase;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .guess-input:focus { border-color: var(--border-hover); }
  .guess-input::placeholder { letter-spacing: 0.5px; color: var(--muted); font-size: 13px; }

  .divider {
    width: 100%;
    max-width: 520px;
    height: 1px;
    background: var(--border);
    margin: 8px 0;
  }

  #win-section {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 1.5rem;
    text-align: center;
  }

  #win-section.visible { display: flex; }

  #win-word {
    font-family: 'DM Mono', monospace;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 500;
    color: var(--win);
    letter-spacing: 0.3em;
    animation: fadeUp 0.5s ease forwards;
  }

  #win-time {
    font-size: 14px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #reset-btn {
    margin-top: 1rem;
    background: transparent;
    border: 1px solid var(--border-hover);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 22px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  #reset-btn:hover { color: var(--text); border-color: var(--text); }

  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 3px;
  }
  .ld-key { background: #1a0a2e; border: 1px solid #6022A6; }
  .ld-correct { background: var(--correct-bg); border: 1px solid var(--correct-border); }
  .ld-wrong { background: var(--wrong-bg); border: 1px solid var(--wrong-border); }
</style>
</head>
<body>

<header>
  <h1>TRAIN THE TRAINER</h1>
  <p>Solve each word. The highlighted letters reveal a hidden word.</p>
</header>

<div class="timer-bar">
  <div class="dot"></div>
  <span id="timer">0:00</span>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot ld-key"></div> Key letter</div>
  <div class="legend-item"><div class="legend-dot ld-correct"></div> Correct</div>
  <div class="legend-item"><div class="legend-dot ld-wrong"></div> Wrong</div>
</div>

<div class="puzzle" id="puzzle"></div>

<div class="divider" style="margin-top:1.5rem;"></div>

<div id="win-section">
  <div style="font-size:13px; color:var(--muted); letter-spacing:0.05em;">The hidden word is</div>
  <div id="win-word">SYDNEY</div>
  <div id="win-time"></div>
  <button id="reset-btn">Play again</button>
</div>

<script>
const PUZZLES = [
  { word: "STRIATUM",  keyIdx: 0, clue: "Vizamyl has five read regions, one called the _____, which is less affected by atrophy" },
  { word: "YOY",       keyIdx: 0, clue: "PDx 2025 business growth was 12% _____." },
  { word: "DATSCAN",   keyIdx: 0, clue: "GE HealthCare SPECT radiopharmaceutical for dopamine transporter imaging" },
  { word: "NEPHRONS",  keyIdx: 0, clue: "You lose _____ with every CT injection" },
  { word: "ESTROGEN",  keyIdx: 0, clue: "Cerianna is a PET imaging tracer for detection of _____ receptor positive lesions" },
  { word: "SYSTEMIC",  keyIdx: 1, clue: "NFS stands for nephrogenic _____ fibrosis" },
];

let startTime = null;
let timerInterval = null;
let finished = false;

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

function startTimer() {
  if (startTime) return;
  startTime = Date.now();
  timerInterval = setInterval(() => {
    document.getElementById('timer').textContent = formatTime(Date.now() - startTime);
  }, 500);
}

function stopTimer() {
  clearInterval(timerInterval);
}

function buildPuzzle() {
  const container = document.getElementById('puzzle');
  container.innerHTML = '';
  PUZZLES.forEach((p, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'row-wrap';

    const clue = document.createElement('div');
    clue.className = 'clue';
    clue.innerHTML = `<strong>${i + 1}.</strong>${p.clue}`;
    wrap.appendChild(clue);

    const tileRow = document.createElement('div');
    tileRow.className = 'tile-row';
    for (let c = 0; c < p.word.length; c++) {
      const t = document.createElement('div');
      t.className = 'tile empty' + (c === p.keyIdx ? ' key' : '');
      t.id = `t-${i}-${c}`;
      tileRow.appendChild(t);
    }
    wrap.appendChild(tileRow);

    const inp = document.createElement('input');
    inp.className = 'guess-input';
    inp.id = `input-${i}`;
    inp.maxLength = p.word.length;
    inp.placeholder = `${p.word.length}-letter word`;
    inp.autocomplete = 'off';
    inp.spellcheck = false;
    inp.addEventListener('input', () => {
      if (!finished) startTimer();
      handleInput(i, inp.value.toUpperCase());
    });
    wrap.appendChild(inp);

    container.appendChild(wrap);
  });
}

function handleInput(rowIdx, val) {
  const p = PUZZLES[rowIdx];
  for (let c = 0; c < p.word.length; c++) {
    const t = document.getElementById(`t-${rowIdx}-${c}`);
    const letter = val[c] || '';
    const isKey = c === p.keyIdx;
    if (!letter) {
      t.textContent = '';
      t.className = 'tile empty' + (isKey ? ' key' : '');
    } else {
      t.textContent = letter;
      if (val.length === p.word.length) {
        const correct = letter === p.word[c];
        t.className = 'tile ' + (correct ? 'correct' : 'wrong') + (isKey ? ' key' : '');
      } else {
        t.className = 'tile' + (isKey ? ' key' : '');
      }
    }
  }
  checkWin();
}

function checkWin() {
  if (finished) return;
  const allCorrect = PUZZLES.every((p, i) => {
    return document.getElementById(`input-${i}`).value.toUpperCase() === p.word;
  });
  if (allCorrect) {
    finished = true;
    stopTimer();
    const elapsed = startTime ? formatTime(Date.now() - startTime) : '—';
    const section = document.getElementById('win-section');
    document.getElementById('win-time').textContent = 'Solved in ' + elapsed;
    section.classList.add('visible');
    section.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

document.getElementById('reset-btn').onclick = () => {
  finished = false;
  startTime = null;
  stopTimer();
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('win-section').classList.remove('visible');
  buildPuzzle();
};

buildPuzzle();
</script>
</body>
</html>
